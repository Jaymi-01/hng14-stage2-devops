name: CI Pipeline

on: [push, pull_request]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install flake8 pytest pytest-cov
          pip install -r api/requirements.txt

      - name: pipeline_has_flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: pipeline_has_hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
          no-fail: true

      - name: pipeline_compose_up_in_ci
        run: |
          # Build specifically for Trivy first
          docker build -t api-test:latest ./api
          # Run compose check
          docker compose build
          docker compose up -d
          docker compose ps
          docker compose down

      - name: pipeline_has_trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'api-test:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'

      - name: pipeline_sarif_artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif

      - name: pipeline_has_pytest
        run: |
          export REDIS_HOST=localhost
          pytest --cov=. --cov-report=xml

      - name: test_has_integration_sh
        run: bash tests/integration.sh

      - name: pipeline_coverage_artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeline_coverage_artifact
          path: coverage.xml